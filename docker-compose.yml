version: "3.9"

services:
  benefits26:
    image: nginx:alpine
    container_name: benefits26
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./docker:/etc/nginx/conf.d:ro
      - .:/var/www/html:ro
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    command: serve --http=0.0.0.0:8090 --dir /pb/pb_data --migrationsDir /pb/pb_migrations
    volumes:
      - pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pb_data:

