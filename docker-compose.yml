version: "3.9"

services:
  benefits26:
    image: nginx:alpine
    container_name: benefits26
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/var/www/html/index.html:ro
      - ./styles:/var/www/html/styles:ro
      - ./src:/var/www/html/src:ro
    depends_on:
      - pocketbase
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
