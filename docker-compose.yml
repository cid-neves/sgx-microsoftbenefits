version: "3.9"

services:
  benefits26:
    build: .                      # builds from Dockerfile in repo root
    container_name: benefits26
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data                    # named volume — persists across redeploys
      - ./pb_migrations:/pb/pb_migrations      # from repo clone — runs migrations on start
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pb_data:    # Docker-managed, survives stack redeploys
